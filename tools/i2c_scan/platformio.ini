; Standalone PlatformIO project - skaner I2C dla nowego PCB v4 (ESP32-S3).
; Wgrywa się na te same piny SDA=40, SCL=39 i wypisuje wszystkie znalezione adresy.

[env:i2c_scan]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = COM4
monitor_port = COM4
board_build.partitions = default_16MB.csv
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
