; Standalone PlatformIO project — kreator mapowania klawiatury przez Serial.
; Uzycie:
;   1. Otworz folder tools/keymap_scan jako PlatformIO project (lub:
;      cd tools/keymap_scan && pio run -t upload && pio device monitor)
;   2. Flashuje sie tylko TEN program (nie ruszamy main firmware'u)
;   3. Otworz Serial Monitor 115200, postepuj wg promptow.
;   4. Po przejsciu 27 klawiszy wyswietli sie tabela do wklejenia.
;   5. Aby wrocic do glownego firmware'u: pio run -t upload w glownym katalogu.

[env:keymap_scan]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM6
monitor_port = COM6
board_build.partitions = huge_app.csv
board_build.flash_mode = qio
board_upload.flash_size = 4MB
lib_deps =
    adafruit/Adafruit MCP23017 Arduino Library@>=2.3.0
build_flags =
    -DCORE_DEBUG_LEVEL=1
