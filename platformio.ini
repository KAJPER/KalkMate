; PlatformIO Project Configuration File — KalkMate v2 (ESP32-S3)
;
; PCB v4 (czerwiec 2026): ESP32-S3-WROOM-1-N16R8 (16MB flash + 8MB PSRAM)
; Stary projekt ESP32-WROVER-E [env:esp32wrover_legacy] zachowany dla starych plytek.

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = COM10
monitor_port = COM10
; 16MB flash z OTA: default_16MB.csv = 2x 6.25MB app + ~2MB SPIFFS
board_build.partitions = default_16MB.csv
; ESP32-S3-WROOM-1-N16R8: flash = QIO (Quad-SPI), PSRAM = OPI (Octal-SPI).
; KLUCZOWE: memory_type MUSI byc "qio_opi" — bez tego Arduino probuje czytac
; PSRAM jako Quad i dostaje "PSRAM ID read error 0xffffff".
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
lib_ldf_mode = deep+
build_src_filter = +<*> -<test_ui.cpp> -<testoledfinal.cpp> -<testkeyboard.cpp> -<testkamera.cpp> -<testi2c.cpp> -<testoled.cpp>
lib_deps =
    olikraus/U8g2@>=2.35.0
    adafruit/Adafruit MCP23017 Arduino Library@>=2.3.0
    https://github.com/espressif/esp32-camera.git
    ricmoo/QRCode@^0.0.1
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_BOOTLOADER_LOG_LEVEL_NONE=1
    -DCONFIG_BOOTLOADER_LOG_LEVEL=0
    ; USB-CDC enabled - ESP32-S3 wystawia sie jako COM port przez native USB-C
    ; (GPIO19=D-, GPIO20=D+ przez USBLC6-2SC6)
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1


; -----------------------------------------------------------------------------
; LEGACY: stary PCB z ESP32-WROVER-E (4MB flash, brak natywnej USB)
; Wybierz to env jezeli flashujesz stara plytke.
; -----------------------------------------------------------------------------
[env:esp32wrover_legacy]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM6
monitor_port = COM6
board_build.partitions = min_spiffs.csv
board_build.flash_mode = qio
board_upload.flash_size = 4MB
lib_ldf_mode = deep+
build_src_filter = +<*> -<test_ui.cpp> -<testoledfinal.cpp> -<testkeyboard.cpp> -<testkamera.cpp> -<testi2c.cpp> -<testoled.cpp>
lib_deps =
    olikraus/U8g2@>=2.35.0
    adafruit/Adafruit MCP23017 Arduino Library@>=2.3.0
    https://github.com/espressif/esp32-camera.git
    ricmoo/QRCode@^0.0.1
build_flags =
    -DKALK_HW_LEGACY=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_BOOTLOADER_LOG_LEVEL_NONE=1
    -DCONFIG_BOOTLOADER_LOG_LEVEL=0
    -DCONFIG_BOOTLOADER_HOLD_TIME_GPIO=0
