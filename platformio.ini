; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32wrover]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3
board_build.partitions = huge_app.csv
board_build.flash_mode = qio
board_upload.flash_size = 4MB
lib_ldf_mode = deep+
build_src_filter = +<*> -<test_ui.cpp> -<testoledfinal.cpp> -<testkeyboard.cpp> -<testkamera.cpp>
lib_deps =
    olikraus/U8g2@>=2.35.0
    adafruit/Adafruit MCP23017 Arduino Library@>=2.3.0
    https://github.com/espressif/esp32-camera.git
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=1
    ; Przyspieszenie boot — wycisz logi bootloadera ESP-IDF
    -DCONFIG_BOOTLOADER_LOG_LEVEL_NONE=1
    -DCONFIG_BOOTLOADER_LOG_LEVEL=0
    ; Skip bootloader 2-second hold (do flash mode) — boot o 1.5s szybszy
    -DCONFIG_BOOTLOADER_HOLD_TIME_GPIO=0
